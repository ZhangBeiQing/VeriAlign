model:
  path: /root/autodl-tmp/Qwen3.5-4B
  use_4bit: true
  attn_implementation: sdpa

data:
  path: reward_seed.json
  max_length: 2048

output:
  dir: /root/autodl-tmp/UniAlign-dpo-safe-lora

training:
  epochs: 3.0
  max_steps: -1
  learning_rate: 5.0e-6
  beta: 0.1
  batch_size: 1
  grad_accum: 8
  logging_steps: 1
  save_steps: 20
  seed: 42

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

wandb:
  enabled: true
  project: unialign
  entity: null
  mode: online
  run_name: null
  group: qwen35-dpo-lora
  report_model: false

runtime:
  fla_tilelang: "0"
  triton_f32_default: ieee
